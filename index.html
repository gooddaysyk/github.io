  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

<body>
  <div id="root"></div>

  <!-- Dependencies -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── helpers ──────────────────────────────────────────────────────────── */
    const wait = (ms) => new Promise((ok) => setTimeout(ok, ms));
    const FACE = { happy:"😄", angry:"😠", surprised:"😱", sad:"😢" };

    /* ── 3-D character ────────────────────────────────────────────────────── */
    function makeChar(hex) {
      const root = new THREE.Group();
      const mat  = (c) => new THREE.MeshLambertMaterial({ color: c });

      const body = new THREE.Mesh(new THREE.BoxGeometry(0.75,1.05,0.5), mat(hex));
      root.add(body);

      const head = new THREE.Mesh(new THREE.SphereGeometry(0.4,16,16), mat(0xFFD5A0));
      head.position.y = 0.9;
      root.add(head);

      const eyeG = new THREE.SphereGeometry(0.075,8,8);
      const eyeM = mat(0x111111);
      const le = new THREE.Mesh(eyeG,eyeM); le.position.set(-0.14,0.95,0.37); root.add(le);
      const re = new THREE.Mesh(eyeG,eyeM); re.position.set(0.14,0.95,0.37);  root.add(re);

      const armG = new THREE.BoxGeometry(0.2,0.65,0.2);
      const la = new THREE.Mesh(armG,mat(hex)); la.position.set(-0.58,-0.08,0); la.rotation.z=0.35;  root.add(la);
      const ra = new THREE.Mesh(armG,mat(hex)); ra.position.set(0.58,-0.08,0);  ra.rotation.z=-0.35; root.add(ra);

      const legG = new THREE.BoxGeometry(0.24,0.55,0.24);
      const ll = new THREE.Mesh(legG,mat(0x2a2a4a)); ll.position.set(-0.21,-0.75,0); root.add(ll);
      const rl = new THREE.Mesh(legG,mat(0x2a2a4a)); rl.position.set(0.21,-0.75,0);  root.add(rl);

      return root;
    }

    /* ── UI parts ─────────────────────────────────────────────────────────── */
    function Overlay({ children }) {
      return (
        <div style={{
          position:"absolute", inset:0,
          background:"rgba(10,10,30,0.85)",
          display:"flex", alignItems:"center", justifyContent:"center",
          backdropFilter:"blur(4px)",
        }}>
          {children}
        </div>
      );
    }

    function Btn({ onClick, bg, children }) {
      return (
        <button
          onClick={onClick}
          style={{
            padding:"13px 30px", fontSize:"15px", fontWeight:"900",
            background:bg, color:"#fff", border:"3px solid #000",
            borderRadius:"6px", cursor:"pointer", letterSpacing:"1px",
            boxShadow:"4px 4px 0 #000", fontFamily:"Impact, sans-serif",
            WebkitTapHighlightColor:"transparent",
          }}
          onMouseDown={e=>{ e.currentTarget.style.transform="translate(2px,2px)"; e.currentTarget.style.boxShadow="2px 2px 0 #000"; }}
          onMouseUp={e=>{ e.currentTarget.style.transform=""; e.currentTarget.style.boxShadow="4px 4px 0 #000"; }}
        >
          {children}
        </button>
      );
    }

    /* ── main component ───────────────────────────────────────────────────── */
    function Studio() {
      const [phase,  setPhase]  = useState("idle");
      const [story,  setStory]  = useState(null);
      const [sIdx,   setSIdx]   = useState(0);
      const [dIdx,   setDIdx]   = useState(-1);
      const [popup,  setPopup]  = useState(null);

      const canvasWrap = useRef(null);
      const raf        = useRef(null);
      const speaker    = useRef(null);

      /* Three.js init */
      useEffect(() => {
        const wrap = canvasWrap.current;
        if (!wrap) return;
        const W = wrap.clientWidth  || 640;
        const H = wrap.clientHeight || 400;

        const renderer = new THREE.WebGLRenderer({ antialias:true });
        renderer.setSize(W, H);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
        renderer.setClearColor(0xFDF6E3);
        wrap.appendChild(renderer.domElement);

        const ts  = new THREE.Scene();
        const cam = new THREE.PerspectiveCamera(52, W/H, 0.1, 60);
        cam.position.set(0, 1.1, 6);
        cam.lookAt(0, 0.2, 0);

        ts.add(new THREE.AmbientLight(0xffffff, 0.75));
        const sun = new THREE.DirectionalLight(0xfffbe0, 1.1);
        sun.position.set(4,9,6); ts.add(sun);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(22,22), new THREE.MeshLambertMaterial({color:0xF0E0B0}));
        floor.rotation.x = -Math.PI/2; floor.position.y = -1.3; ts.add(floor);

        const wall = new THREE.Mesh(new THREE.PlaneGeometry(18,9), new THREE.MeshLambertMaterial({color:0xFAEDCC}));
        wall.position.set(0,1.5,-5.5); ts.add(wall);

        const charA = makeChar(0xFF5F5F); charA.position.set(-1.8,-0.25,0); ts.add(charA);
        const charB = makeChar(0x4A90E2); charB.position.set(1.8,-0.25,0); charB.rotation.y=Math.PI; ts.add(charB);

        let t = 0;
        const tick = () => {
          raf.current = requestAnimationFrame(tick);
          t += 0.04;
          const sp = speaker.current;
          if (sp === "A") {
            charA.position.y = -0.25 + Math.abs(Math.sin(t*5))*0.2;
            charA.rotation.y = Math.sin(t*3)*0.12;
            charB.position.y = -0.25 + Math.sin(t)*0.025;
          } else if (sp === "B") {
            charB.position.y = -0.25 + Math.abs(Math.sin(t*5))*0.2;
            charB.rotation.y = Math.PI + Math.sin(t*3)*0.12;
            charA.position.y = -0.25 + Math.sin(t)*0.025;
          } else {
            charA.position.y = -0.25 + Math.sin(t)*0.04;
            charB.position.y = -0.25 + Math.sin(t+Math.PI)*0.04;
            charA.rotation.y = 0; charB.rotation.y = Math.PI;
          }
          renderer.render(ts, cam);
        };
        tick();

        const onResize = () => {
          const nW = wrap.clientWidth, nH = wrap.clientHeight;
          cam.aspect = nW/nH; cam.updateProjectionMatrix();
          renderer.setSize(nW, nH);
        };
        window.addEventListener("resize", onResize);

        return () => {
          window.removeEventListener("resize", onResize);
          cancelAnimationFrame(raf.current);
          renderer.dispose();
          if (wrap.contains(renderer.domElement)) wrap.removeChild(renderer.domElement);
        };
      }, []);

        await wait(900);

        let idx;
        do { idx = Math.floor(Math.random() * SCENARIOS.length); }
        while (idx === lastIdxRef.current && SCENARIOS.length > 1);
        lastIdxRef.current = idx;

        speaker.current = null; setPhase("playing");
      };

          setDIdx(-1); setPopup(null); speaker.current = null;
          await wait(500); if (dead) return;

          const bangText = sc.bang ?? null;
          if (bangText) {
            setPopup(bangText);
            await wait(900); if (dead) return;
            setPopup(null);
            await wait(200); if (dead) return;
          }

            if (dead) return;
            speaker.current = sc.lines[i].who;
            setDIdx(i);
            await wait(3000);

          if (dead) return;
          speaker.current = null; setDIdx(-1);
          await wait(400); if (dead) return;
          setSIdx(n => n+1);

        return () => { dead = true; };

                </div>
                <div style={{fontSize:"15px",fontWeight:"bold",lineHeight:1.4,color:"#111"}}>{currLine.say}</div>
                <div style={{position:"absolute",bottom:-14,...(bubbleLeft?{left:22}:{right:22}),width:0,height:0,borderLeft:"9px solid transparent",borderRight:"9px solid transparent",borderTop:"14px solid #111"}} />
                <div style={{position:"absolute",bottom:-10,...(bubbleLeft?{left:24}:{right:24}),width:0,height:0,borderLeft:"7px solid transparent",borderRight:"7px solid transparent",borderTop:"11px solid #fff"}} />
              </div>
            )}

            {/* comic bang */}
            {popup !== null && (
              <div style={{
                position:"absolute", top:"22%", left:"50%",
                transform:"translate(-50%,-50%) rotate(-10deg)",
                fontSize:"70px", fontWeight:"900", color:"#FFE600",
                textShadow:"5px 5px 0 #FF2200, 9px 9px 0 #000",
                userSelect:"none", pointerEvents:"none",
                fontFamily:"Impact,sans-serif", letterSpacing:3,
                animation:"comicPop 0.15s ease-out both", zIndex:20,
              }}>
                {popup}!
              </div>
            )}

            {/* name tags */}
            {(phase==="playing"||phase==="done") && story && (
              <>
                <div style={{position:"absolute",bottom:14,left:"12%",color:"#FF5F5F",fontSize:"14px",letterSpacing:1,textShadow:"2px 2px 0 #000"}}>{story.chars[0]?.name}</div>
                <div style={{position:"absolute",bottom:14,right:"12%",color:"#4A90E2",fontSize:"14px",letterSpacing:1,textShadow:"2px 2px 0 #000"}}>{story.chars[1]?.name}</div>
              </>
            )}

            {/* done */}
            {phase==="done" && (
              <Overlay>
                <div style={{textAlign:"center"}}>
                  <div style={{background:"#FFE600",border:"4px solid #000",padding:"14px 32px",marginBottom:"18px",boxShadow:"6px 6px 0 #000",transform:"rotate(2deg)"}}>
                    <div style={{fontSize:"32px",color:"#000"}}>🎉 완성!</div>
                  </div>
                  <div style={{color:"#FFE600",fontFamily:"sans-serif",fontSize:"15px",fontWeight:"bold",marginBottom:6}}>{story?.title}</div>
                  {story?.concept && <div style={{color:"#aaa",fontFamily:"sans-serif",fontSize:"12px",marginBottom:"24px"}}>💡 {story.concept}</div>}
                  <div style={{display:"flex",gap:14,justifyContent:"center"}}>
                    <Btn bg="#22a06b" onClick={replayFromStart}>▶ 다시 보기</Btn>
                    <Btn bg="#e94560" onClick={resetToIdle}>🔄 새 작품</Btn>
                  </div>
                </div>
              </Overlay>
            )}
          </div>

          <style>{`
            @keyframes popIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
            @keyframes comicPop { from{transform:translate(-50%,-50%) rotate(-10deg) scale(0.3);opacity:0} to{transform:translate(-50%,-50%) rotate(-10deg) scale(1);opacity:1} }
            @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
            @keyframes bounce { from{transform:translateY(0);opacity:0.4} to{transform:translateY(-12px);opacity:1} }
          `}</style>
        </div>
      );
    }

    /* mount */
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Studio />);
  </script>

  <!-- Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js")
          .then(r => console.log("SW registered:", r.scope))
          .catch(e => console.log("SW error:", e));
      });
    }
  </script>
</body>
</html>
